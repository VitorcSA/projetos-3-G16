<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora CO₂</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        button:hover {
            background: darkgreen;
        }

        #resultado {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de CO₂</h2>

    <button type="button" onclick="calcular()">Calcular</button>

    <button type="button" onclick="exportarCSV()">Exportar CSV</button>

    <button type="button" onclick="exportarPDF()">Exportar PDF</button>

    <div id="resultado"></div>
</div>

<script>
function getToken() {
    return localStorage.getItem("token");
}

function calcular() {
    const token = getToken();

    if (!token) {
        document.getElementById("resultado").innerHTML =
            "❌ Token JWT não encontrado. Faça login novamente.";
        return;
    }

    fetch("/api/calculator/calcular", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({})
    })
    .then(async res => {
        const text = await res.text();

        if (!res.ok) {
            throw new Error(text || "Erro na requisição");
        }

        return JSON.parse(text);
    })
    .then(data => {
        document.getElementById("resultado").innerHTML =
            "🌍 Emissão Física: " + data.emissaoCartaoFisico.toFixed(2) + " kg<br>" +
            "⚡ Emissão Digital: " + data.emissaoCartaoDigital.toFixed(2) + " kg<br>" +
            "📉 Diferença: " + data.diferenca.toFixed(2) + " kg<br>" +
            "📊 Redução: " + data.percentualReducao.toFixed(2) + "%";
    })
    .catch(err => {
        document.getElementById("resultado").innerHTML =
            "❌ " + err.message;
        console.error(err);
    });
}

function exportarCSV() {
    const token = getToken();

    if (!token) {
        alert("Token JWT não encontrado. Faça login novamente.");
        return;
    }

    fetch("/api/calculator/export/csv", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({})
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Erro ao gerar CSV");
        }
        return res.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = "resultado_co2.csv";

        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(url);
    })
    .catch(err => {
        alert(err.message);
        console.error(err);
    });
}

function exportarPDF() {
    const token = getToken();

    if (!token) {
        alert("Token JWT não encontrado. Faça login novamente.");
        return;
    }

    fetch("/api/calculator/export/pdf", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({})
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Erro ao gerar PDF");
        }
        return res.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = "resultado_co2.pdf";

        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(url);
    })
    .catch(err => {
        alert(err.message);
        console.error(err);
    });
}
</script>

</body>
</html>
