<!DOCTYPE html>
<html>
<script>
	const token = localStorage.getItem('token');
	if (!token) {
		window.location.href = 'login.html';
		return;
	}

	fetch('/api/auth/validate', {
		headers: {'Authorization': `Bearer ${token}`}
	}).then(res => {
		if (!res.ok) {
			localStorage.removeItem('token');
			window.location.href = 'login.html';
			return;
		}
	});
</script>

<head>
	<meta charset="UTF-8">
	<title>Home - Sintropia</title>
</head>

<body></body>

</html>
