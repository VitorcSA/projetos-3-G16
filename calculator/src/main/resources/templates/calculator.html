<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora CO₂</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 30px 16px;
        }

        .container {
            background: white;
            padding: 28px;
            border-radius: 12px;
            width: 460px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin: 0 0 22px;
            font-size: 20px;
            color: #1a1a1a;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 15px;
            border-radius: 7px;
            transition: background 0.2s;
        }

        button:hover { background: #1b5e20; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        button.secondary {
            background: #1565c0;
        }
        button.secondary:hover { background: #0d47a1; }

        button.outline {
            background: transparent;
            color: #2e7d32;
            border: 1.5px solid #2e7d32;
        }
        button.outline:hover {
            background: #f1f8f1;
        }

        #resultado {
            margin-top: 18px;
            font-weight: 500;
            text-align: center;
            line-height: 1.8;
            color: #222;
            font-size: 15px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 18px;
        }

        .card {
            background: #f4f9f4;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .card .label {
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
        }

        .card .value {
            font-size: 22px;
            font-weight: 600;
            color: #2e7d32;
        }

        .card .unit {
            font-size: 12px;
            color: #777;
        }

        .card.highlight {
            background: #e8f5e9;
            border-color: #66bb6a;
        }

        #chart-section {
            display: none;
            margin-top: 24px;
        }

        #chart-section h3 {
            text-align: center;
            font-size: 14px;
            color: #444;
            margin: 0 0 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        #chart-wrapper {
            position: relative;
            height: 220px;
        }

        .divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }

        #erro {
            color: #c62828;
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de CO₂</h2>

    <div class="btn-group">
        <button id="btn-calcular" onclick="calcular()">Calcular</button>
        <button class="secondary" id="btn-grafico" onclick="gerarGrafico()" disabled>Gerar Gráfico</button>
        <button class="outline" onclick="exportarCSV()">Exportar CSV</button>
        <button class="outline" onclick="exportarPDF()">Exportar PDF</button>
    </div>

    <div id="erro"></div>
    <div id="resultado"></div>

    <div id="chart-section">
        <hr class="divider">
        <h3>Comparativo de emissões</h3>
        <div id="chart-wrapper">
            <canvas id="meuGrafico"></canvas>
        </div>
    </div>
</div>

<script>
let dadosCalculados = null;
let chartInstance = null;

function getToken() {
    return localStorage.getItem("token");
}

function mostrarErro(msg) {
    const el = document.getElementById("erro");
    el.textContent = "❌ " + msg;
    el.style.display = "block";
}

function limparErro() {
    document.getElementById("erro").style.display = "none";
}

function calcular() {
    limparErro();
    const token = getToken();

    if (!token) {
        mostrarErro("Token JWT não encontrado. Faça login novamente.");
        return;
    }

    const btn = document.getElementById("btn-calcular");
    btn.disabled = true;
    btn.textContent = "Calculando...";

    fetch("/api/calculator/calcular", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({})
    })
    .then(async res => {
        const text = await res.text();
        if (!res.ok) throw new Error(text || "Erro na requisição");
        return JSON.parse(text);
    })
    .then(data => {
        dadosCalculados = data;

        document.getElementById("resultado").innerHTML = `
            <div class="cards">
                <div class="card">
                    <div class="label">🌍 Emissão Física</div>
                    <div class="value">${data.emissaoCartaoFisico.toFixed(2)}</div>
                    <div class="unit">kg CO₂</div>
                </div>
                <div class="card">
                    <div class="label">⚡ Emissão Digital</div>
                    <div class="value">${data.emissaoCartaoDigital.toFixed(2)}</div>
                    <div class="unit">kg CO₂</div>
                </div>
                <div class="card">
                    <div class="label">📉 Diferença</div>
                    <div class="value">${data.diferenca.toFixed(2)}</div>
                    <div class="unit">kg CO₂</div>
                </div>
                <div class="card highlight">
                    <div class="label">📊 Redução</div>
                    <div class="value">${data.percentualReducao.toFixed(2)}%</div>
                    <div class="unit">economia</div>
                </div>
            </div>`;
        document.getElementById("btn-grafico").disabled = false;
    })
    .catch(err => {
        mostrarErro(err.message);
        console.error(err);
    })
    .finally(() => {
        btn.disabled = false;
        btn.textContent = "Calcular";
    });
}

function gerarGrafico() {
    if (!dadosCalculados) return;

    const section = document.getElementById("chart-section");
    section.style.display = "block";
    section.scrollIntoView({ behavior: "smooth", block: "nearest" });

    if (chartInstance) {
        chartInstance.destroy();
    }

    const ctx = document.getElementById("meuGrafico").getContext("2d");

    const fisico = dadosCalculados.emissaoCartaoFisico;
    const digital = dadosCalculados.emissaoCartaoDigital;
    const max = Math.max(fisico, digital);

    chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Cartão Físico", "Cartão Digital", "Diferença"],
            datasets: [{
                label: "Emissão de CO₂ (kg)",
                data: [
                    parseFloat(fisico.toFixed(2)),
                    parseFloat(digital.toFixed(2)),
                    parseFloat(dadosCalculados.diferenca.toFixed(2))
                ],
                backgroundColor: [
                    "rgba(211, 47, 47, 0.75)",
                    "rgba(25, 118, 210, 0.75)",
                    "rgba(46, 125, 50, 0.75)"
                ],
                borderColor: [
                    "#c62828",
                    "#1565c0",
                    "#1b5e20"
                ],
                borderWidth: 1.5,
                borderRadius: 6,
                borderSkipped: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => ` ${ctx.parsed.y.toFixed(2)} kg CO₂`
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: max * 1.25,
                    ticks: {
                        callback: val => val.toFixed(1) + " kg",
                        font: { size: 11 },
                        color: "#555"
                    },
                    grid: {
                        color: "rgba(0,0,0,0.06)"
                    }
                },
                x: {
                    ticks: {
                        font: { size: 12 },
                        color: "#333"
                    },
                    grid: { display: false }
                }
            },
            animation: {
                duration: 600,
                easing: "easeOutQuart"
            }
        }
    });
}

function exportarCSV() {
    const token = getToken();
    if (!token) { alert("Token JWT não encontrado. Faça login novamente."); return; }

    fetch("/api/calculator/export/csv", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({})
    })
    .then(res => {
        if (!res.ok) throw new Error("Erro ao gerar CSV");
        return res.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "resultado_co2.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    })
    .catch(err => { alert(err.message); console.error(err); });
}

function exportarPDF() {
    const token = getToken();
    if (!token) { alert("Token JWT não encontrado. Faça login novamente."); return; }

    fetch("/api/calculator/export/pdf", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({})
    })
    .then(res => {
        if (!res.ok) throw new Error("Erro ao gerar PDF");
        return res.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "resultado_co2.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    })
    .catch(err => { alert(err.message); console.error(err); });
}
</script>

</body>
</html>
