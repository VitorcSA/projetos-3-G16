<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Home - Sintropia</title>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
	<header>
	    <nav>
	        <span>Sintropia</span>
	        <button id="profile_button" name="profile_button">Veja Sua Conta</button>
	    </nav>
	</header>

	<main>
		<h1>Bem-vindo à Sintropia</h1>

		<section id="calculation_info">

		    <div id="saved_box">
		        <p>Economia de emissões</p>
		        <h2 id="saved_value">...</h2>
		        <p>CO₂ evitado por ano</p>
		    </div>

		    <div id="physical_box">
		        <p>Emissão Cartão Físico</p>
		        <h2 id="physical_value">...</h2>
		        <p>Emitidos por ano (físico)</p>
		    </div>

		    <div id="digital_box">
		        <p>Emissão Cartão Digital</p>
		        <h2 id="digital_value">...</h2>
		        <p>Emitidos por ano (digital)</p>
		    </div>

		    <div id="money_box">
		        <p>Gasto com cartão físico</p>
		        <h2 id="money_value">...</h2>
		        <p>Custo anual estimado</p>
		    </div>

		</section>
	</main>

	<dialog name="profile_dialog" id="profile_dialog">
		<button onclick="this.closest('dialog').close()">Fechar</button>
		<form id="profile_form">
				<input type="text" name="name" placeholder="Seu nome">
				<input type="email" name="email" placeholder="Seu E-mail">
				<input type="password" name="password" placeholder="****">
				<input type="number" name="staff_count" placeholder="Numero de funcionarios">
				<input type="number" name="digital_staff_count" placeholder="Numero de funcionarios com cartão digital">

				<select name="state" id="state" onchange="loadCities(this,this.form.querySelector('#city'))">
				    <option value="">Selecione o estado</option>
				</select>

				<select name="city" id="city" disabled>
				    <option value="">Selecione a cidade</option>
				</select>

				<button type="submit">Enviar</button>
			</form>
	</dialog>

	<script type="module" src="js/index.js"></script>
</body>

</html>
