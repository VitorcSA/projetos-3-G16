<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Home - Sintropia</title>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<link rel="stylesheet" href="/css/global.css">
	<link rel="stylesheet" href="/css/navbar.css">
	<link rel="stylesheet" href="/css/index.css">
	<script src="/js/navbar.js" type="module"></script>

	<script th:inline="javascript">
		const data = {
			annualPhysicEmission: /*[[${calculation.annualPhysicEmission}]]*/ 0,
			annualDigitalEmission: /*[[${calculation.annualDigitalEmission}]]*/ 0,
			moneyWasted: /*[[${calculation.moneyWasted}]]*/ 0,
			transportEmissionPercentage: /*[[${calculation.transportEmissionPercentage}]]*/ 0,
			productionEmissionPercentage: /*[[${calculation.productionEmissionPercentage}]]*/ 0,
			disposalEmissionPercentage: /*[[${calculation.disposalEmissionPercentage}]]*/ 0,
			cardCount: /*[[${calculation.cardCount}]]*/ 0
		};
	</script>

</head>

<body>
	<header th:replace="~{fragments :: navbar}"></header>

	<main class="main-content">
		<section class="welcome-section">
			<h1 class="welcome-title">
				Dashboard / <span class="welcome-subtitle">Emissão Prevista</span>
			</h1>
		</section>

		<section id="calculation_info" class="cards-section">
			<div class="info-card" id="physical_box">
				<div class="icon-wrapper">
					<img src="/images/cartao.svg" alt="" class="card-icon">
				</div>
				<p class="card-label">Cartão Físico</p>
				<h2 class="card-value"
					th:text="${#numbers.formatDecimal(calculation.annualPhysicEmission, 1, 'POINT', 2, 'COMMA')} + ' kg'">
					...</h2>
				<p class="card-description"
					th:text="'Equivalente a ' + ${calculation.cardCount} + ' cartões'"></p>
			</div>

			<div class="info-card" id="digital_box">
				<div class="icon-wrapper">
					<img src="/images/digital.svg" alt="" class="card-icon">
				</div>
				<p class="card-label">Cartão Digital</p>
				<h2 class="card-value"
					th:text="${#numbers.formatDecimal(calculation.annualDigitalEmission, 1, 'POINT', 2, 'COMMA')} + ' kg'">
					...</h2>
				<p class="card-description">Emitidos por cartão Digital</p>
			</div>

			<div class="info-card" id="saved_box">
				<div class="icon-wrapper">
					<img src="/images/cloud.svg" alt="" class="card-icon">
				</div>
				<p class="card-label">Economia de emissões</p>
				<h2 class="card-value"
					th:text="${#numbers.formatDecimal(calculation.annualPhysicEmission - calculation.annualDigitalEmission, 1, 'POINT', 2, 'COMMA')} + ' kg'">
					...</h2>
				<p class="card-description">CO₂ evitado por ano</p>
			</div>

			<div class="info-card" id="money_box">
				<div class="icon-wrapper">
					<img src="/images/cifrao.svg" alt="" class="card-icon">
				</div>
				<p class="card-label">Dinheiro gasto</p>
				<h2 class="card-value"
					th:text="'R$ ' + ${#numbers.formatDecimal(calculation.moneyWasted, 1, 'POINT', 2, 'COMMA')}">
					...</h2>
				<p class="card-description">reais em produção de cartão</p>
			</div>
		</section>

		<div id="dashboard_grid" class="dashboard-grid">

			<div class="chart-card main-chart">
				<h3>Economia de emissões</h3>
				<p class="subtitle">CO₂ evitado por ano</p>
				<canvas id="mainChart"></canvas>
			</div>

			<div class="side-column">

				<div class="chart-card side-chart">
					<h3>Origem das emissões</h3>
					<canvas id="donutChart"></canvas>
				</div>

				<div class="chart-card side-chart">
					<h3>Equivalências</h3>
					<p class="subtitle">CO₂ evitado por ano</p>

					<div class="equivalences-wrapper">
						<div class="equivalences-container" id="water_equivalence">
							<img src="/images/gota.svg" alt="" class="equivalence-icon">
						</div>
						<div class="equivalences-container" id="tree_equivalence">
							<img src="/images/arvore.svg" alt="" class="equivalence-icon">
						</div>
						<div class="equivalences-container" id="gasoline_equivalence">
							<img src="/images/carro.svg" alt="" class="equivalence-icon">
						</div>
						<div class="equivalences-container" id="bottles_equivalence">
							<img src="/images/garrafa.svg" alt="" class="equivalence-icon">
						</div>

					</div>
				</div>

			</div>
		</div>

	</main>

</body>

</html>
